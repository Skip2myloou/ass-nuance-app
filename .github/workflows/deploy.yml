name: Deploy to Render

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- Backend checks ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install ruff pyright

      - name: Lint backend (ruff)
        run: ruff check backend/

      - name: Type check backend (pyright)
        run: pyright backend/

      # --- Frontend checks ---
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: npm install --prefix frontend

      - name: Type check frontend (tsc)
        run: npx --prefix frontend tsc --noEmit

      # --- Deploy naar Render ---
      # Alleen als alle checks slagen
      - name: Trigger Render deploy — backend
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}"

      - name: Trigger Render deploy — frontend
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}"

# Setup:
# 1. Ga naar Render dashboard → jouw service → Settings → Deploy Hook
# 2. Kopieer de URL
# 3. Ga naar GitHub repo → Settings → Secrets → Actions
# 4. Voeg toe:
#    RENDER_DEPLOY_HOOK_BACKEND  = [jouw backend hook URL]
#    RENDER_DEPLOY_HOOK_FRONTEND = [jouw frontend hook URL]
#
# Daarna: elke push naar main → checks → deploy. Automatisch.
