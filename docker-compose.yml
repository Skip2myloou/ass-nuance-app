

services:
  backend:
    build: ./backend
    volumes:
      - ./backend:/app          # live code sync — geen rebuild bij wijzigingen
    ports:
      - "8000:8000"
    env_file:
      - .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload


  frontend:
    build: ./frontend
    volumes:
      - ./frontend/src:/app/src  # live code sync voor React
      - /app/node_modules         # node_modules blijft in container, niet overschreven
    ports:
      - "3000:3000"
    env_file:
      - .env
    command: npm run dev

# Gebruik:
# Eerste keer:        docker-compose up --build
# Daarna:             docker-compose up          (geen rebuild)
# Na pip install:     docker-compose up --build backend
# Na npm install:     docker-compose up --build frontend
